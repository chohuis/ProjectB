# 이벤트 콘텐츠 — 02_기획/콘텐츠/02_이벤트.md. I8 1차분(콘텐츠 저작
# 파이프라인) 대표 배치: §1의 6개 트리거 유형(캘린더·본인상태·팀상태·
# 동료상태·콜백·확률) 전부를 최소 1개씩 실증한다. 나머지 이벤트 아이디어
# (§1 인벤토리 38개 중 다루지 않은 항목)는 이후 반복 저작 트랙으로 이월.
#
# 필드:
#   type    = "calendar" | "personal" | "team" | "peer" | "probability" | "callback"
#   week    = 캘린더형만: season_start_day 기준 경과 주차(0-based)
#   stage   = 리그 필터(league_id 그대로). 비우면 전 리그 적용
#   trigger = 폴링형만(콜백형은 호출부가 이미 조건을 다 체크, 이 파일엔
#             안 채움). "확률" 변수는 op/value 대신 chance만 가짐
#   choices = 없으면 선택지 없는 순수 알림(03_메시지_알림.md §7 판별기준)
#   effects.target = "live_state"(field 아무거나, 사기·피로도·주목도 등
#             전부 여기 포함) | "xp"(stat) | "manager_relationship"

[[event]]
id = "event:season_opener"
type = "calendar"
week = 0
urgency = "normal"
body = "새 시즌이 시작됐다. 올 한 해, 어떤 마음가짐으로 임할까."

[[event.choices]]
id = "각오"
label = "각오를 다진다"

[[event.choices.effects]]
target = "live_state"
field = "사기"
delta = 10.0

[[event.choices]]
id = "평소처럼"
label = "평소처럼 담담하게"

[[event.choices.effects]]
target = "xp"
stat = "침착함"
delta = 5.0

